<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="880" height="620" rx="14" fill="#ffffff"/>
  <text x="32" y="44" font-size="24" font-weight="700" fill="#0f172a">RuView · Seeed XIAO 接線與資料流</text>
  <text x="32" y="68" font-size="14" fill="#64748b">WiFi CSI sensing node · 0.96&quot; SSD1306 OLED on the XIAO Expansion Board</text>

  <!-- ===== Wiring card ===== -->
  <rect x="32" y="90" width="430" height="250" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="52" y="118" font-size="16" font-weight="700" fill="#0f172a">接線 (I²C)</text>

  <!-- XIAO board -->
  <rect x="56" y="140" width="150" height="170" rx="10" fill="#0ea5e9"/>
  <text x="131" y="166" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">XIAO ESP32</text>
  <text x="131" y="184" font-size="11" fill="#e0f2fe" text-anchor="middle">S3 / C6 / C5</text>
  <!-- pads -->
  <g font-size="12" fill="#ffffff" text-anchor="end">
    <circle cx="206" cy="212" r="4" fill="#fde68a"/><text x="198" y="216">D4 / SDA</text>
    <circle cx="206" cy="238" r="4" fill="#fde68a"/><text x="198" y="242">D5 / SCL</text>
    <circle cx="206" cy="264" r="4" fill="#fca5a5"/><text x="198" y="268">3V3</text>
    <circle cx="206" cy="290" r="4" fill="#94a3b8"/><text x="198" y="294">GND</text>
  </g>

  <!-- OLED -->
  <rect x="320" y="160" width="118" height="130" rx="10" fill="#1e293b"/>
  <rect x="334" y="178" width="90" height="50" rx="4" fill="#0f172a" stroke="#334155"/>
  <text x="379" y="208" font-size="11" fill="#38bdf8" text-anchor="middle">128 × 64</text>
  <text x="379" y="252" font-size="12" font-weight="700" fill="#e2e8f0" text-anchor="middle">SSD1306</text>
  <text x="379" y="270" font-size="11" fill="#94a3b8" text-anchor="middle">addr 0x3C</text>
  <g font-size="11" fill="#e2e8f0" text-anchor="start">
    <circle cx="320" cy="212" r="4" fill="#fde68a"/><text x="300" y="216" text-anchor="end">SDA</text>
    <circle cx="320" cy="238" r="4" fill="#fde68a"/><text x="300" y="242" text-anchor="end">SCL</text>
    <circle cx="320" cy="264" r="4" fill="#fca5a5"/><text x="300" y="268" text-anchor="end">VCC</text>
    <circle cx="320" cy="290" r="4" fill="#94a3b8"/><text x="300" y="294" text-anchor="end">GND</text>
  </g>
  <!-- wires -->
  <path d="M206 212 H320" stroke="#f59e0b" stroke-width="2.5" fill="none"/>
  <path d="M206 238 H320" stroke="#f59e0b" stroke-width="2.5" fill="none"/>
  <path d="M206 264 H320" stroke="#ef4444" stroke-width="2.5" fill="none"/>
  <path d="M206 290 H320" stroke="#64748b" stroke-width="2.5" fill="none"/>
  <text x="247" y="332" font-size="11" fill="#64748b">擴展板已內建走線，插上即可</text>

  <!-- ===== Pin table ===== -->
  <rect x="486" y="90" width="362" height="250" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="506" y="118" font-size="16" font-weight="700" fill="#0f172a">各板 I²C GPIO</text>
  <g font-size="13">
    <!-- header -->
    <text x="506" y="150" font-weight="700" fill="#475569">板子</text>
    <text x="640" y="150" font-weight="700" fill="#475569">SDA (D4)</text>
    <text x="752" y="150" font-weight="700" fill="#475569">SCL (D5)</text>
    <line x1="506" y1="160" x2="828" y2="160" stroke="#e2e8f0"/>
    <!-- rows -->
    <text x="506" y="188" fill="#0f172a">ESP32‑S3</text><text x="640" y="188" fill="#0f172a">GPIO5</text><text x="752" y="188" fill="#0f172a">GPIO6</text>
    <text x="506" y="218" fill="#0f172a">ESP32‑C6</text><text x="640" y="218" fill="#0f172a">GPIO22</text><text x="752" y="218" fill="#0f172a">GPIO23</text>
    <text x="506" y="248" fill="#0f172a">ESP32‑C5</text><text x="640" y="248" fill="#0f172a">GPIO23</text><text x="752" y="248" fill="#0f172a">GPIO24</text>
  </g>
  <rect x="506" y="266" width="322" height="56" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="518" y="288" font-size="12" font-weight="700" fill="#9a3412">C5 注意</text>
  <text x="518" y="306" font-size="11.5" fill="#9a3412">flash 用 DOUT@40MHz；韌體跳過 mmWave (預設腳 17/18 是 C5 flash 腳)</text>

  <!-- ===== Data flow ===== -->
  <rect x="32" y="362" width="816" height="220" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="52" y="390" font-size="16" font-weight="700" fill="#0f172a">資料流 Data flow</text>

  <!-- node -->
  <rect x="64" y="420" width="170" height="110" rx="10" fill="#0ea5e9"/>
  <text x="149" y="452" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">XIAO 感測節點</text>
  <text x="149" y="474" font-size="11" fill="#e0f2fe" text-anchor="middle">WiFi CSI 擷取</text>
  <text x="149" y="492" font-size="11" fill="#e0f2fe" text-anchor="middle">邊緣 DSP (呼吸/心跳)</text>
  <text x="149" y="510" font-size="11" fill="#e0f2fe" text-anchor="middle">OLED 顯示</text>

  <!-- router -->
  <rect x="356" y="420" width="150" height="110" rx="10" fill="#334155"/>
  <text x="431" y="458" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">2.4GHz AP</text>
  <text x="431" y="480" font-size="11" fill="#cbd5e1" text-anchor="middle">WiFi 路由器</text>

  <!-- PC -->
  <rect x="628" y="420" width="186" height="110" rx="10" fill="#10b981"/>
  <text x="721" y="452" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">電腦 / 聚合器</text>
  <text x="721" y="474" font-size="11" fill="#d1fae5" text-anchor="middle">udp_receiver.py</text>
  <text x="721" y="492" font-size="11" fill="#d1fae5" text-anchor="middle">解析存在/呼吸/心跳</text>

  <!-- arrows -->
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <path d="M234 475 H352" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#ah)"/>
  <text x="293" y="466" font-size="11" fill="#475569" text-anchor="middle">join</text>
  <path d="M506 475 H624" stroke="#475569" stroke-width="2.5" fill="none" marker-end="url(#ah)"/>
  <text x="565" y="466" font-size="11" fill="#475569" text-anchor="middle">UDP :5005</text>
  <text x="565" y="500" font-size="10.5" fill="#94a3b8" text-anchor="middle">vitals 0xC5110002</text>

  <text x="52" y="566" font-size="11" fill="#94a3b8">2.4GHz only (S3) · 同源 idf.py set-target esp32s3|esp32c6|esp32c5 · based on ruvnet/RuView (MIT)</text>
</svg>
